spring:
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://${DB_HOST:capstone-mariadb}:${MARIA_PORT:3306}/${MARIA_DATABASE:capstone_db}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${MARIA_USER:capstone}
    password: ${MARIA_PASSWORD:capstonepass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: 8080

python:
  service:
    url: ${PYTHON_SERVICE_URL:http://capstone-python:8000}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-long-enough}
  expiration: ${JWT_EXPIRATION:3600000}
