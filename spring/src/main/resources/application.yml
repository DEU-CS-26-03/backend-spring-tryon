spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:capstone}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:capstone}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:capstone}}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 3s
        shutdown-timeout: 100ms

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}

app:
  env: ${APP_ENV:local}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

tryon:
  mode: ${TRYON_MODE:mock}
  mock: ${USE_MOCK:true}

file:
  upload-root: ${FILE_UPLOAD_ROOT:/data/uploads}
  result-root: ${FILE_RESULT_ROOT:/data/results}
  upload:
    user-images-dir: ${USER_IMAGES_DIR:/data/uploads/user-images}
    garments-dir: ${GARMENTS_DIR:/data/uploads/garments}
    results-dir: ${RESULTS_DIR:/data/results}

python:
  service:
    url: ${AI_SERVER_URL}
  inference:
    base-url: ${AI_SERVER_URL}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

cm29:
  api:
    base-url: https://api.29cm.co.kr
    authorization: ${CM29_AUTHORIZATION:mock}
    partner-key: ${CM29_PARTNER_KEY:mock}

naver:
  api:
    base-url: https://openapi.naver.com
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}