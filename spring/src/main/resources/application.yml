#Docker Compose 안에서는 http://python-app:8000, 로컬 단독 실행 시에는 기본값 http://localhost:8000
spring:
  datasource:
    #MariaDB 전용 드라이버 추후 수정
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/capstone_db
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # MariaDB 방언 설정
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: 8080

python:
  service:
    url: ${PYTHON_SERVICE_URL:http://localhost:8000}
