spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:capstone}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:capstone}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:capstone}}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}      # [추가] Redis 인증 비밀번호
      timeout: 3s                       # [추가] 명령/연결 지연 시 너무 오래 물고 있지 않도록 timeout 지정
      database: 0                       # [추가] 기본 DB 인덱스 명시
      lettuce:
        pool:
          max-active: 8                 # [추가] 최대 활성 커넥션
          max-idle: 8                   # [추가] 최대 idle 커넥션
          min-idle: 2                   # [추가] 최소 idle 커넥션
          max-wait: 3s                  # [추가] 풀에서 커넥션 대기 시간
        shutdown-timeout: 100ms         # [추가] 종료 시 Lettuce timeout

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}

app:
  env: ${APP_ENV:local}
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

tryon:
  mode: ${TRYON_MODE:mock}
  mock: ${USE_MOCK:true}

file:
  upload-root: ${FILE_UPLOAD_ROOT:/data/uploads}
  result-root: ${FILE_RESULT_ROOT:/data/results}
  upload:
    user-images-dir: ${USER_IMAGES_DIR:/data/uploads/user-images}
    garments-dir: ${GARMENTS_DIR:/data/uploads/garments}
    results-dir: ${RESULTS_DIR:/data/results}

python:
  service:
    url: ${AI_SERVER_URL}
  inference:
    base-url: ${AI_SERVER_URL}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

cm29:
  api:
    base-url: https://api.29cm.co.kr
    authorization: ${CM29_AUTHORIZATION}   # Bearer 토큰 (환경변수)
    partner-key: ${CM29_PARTNER_KEY}       # Partner-Key (환경변수)