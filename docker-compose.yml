version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: capstone-mariadb  # 수정: local-mysql -> capstone-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: capstone_db
      # 주의: MYSQL_USER에 'root'를 넣으면 에러가 납니다. root는 이미 존재하므로 삭제했습니다.
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - ./mariadb/data:/var/lib/mysql
      - ./mariadb/init:/docker-entrypoint-initdb.d
    networks:
      - capstone-net
    healthcheck:
      # 환경변수 치환 오류를 막기 위해 비밀번호(1234)를 직접 입력했습니다.
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p1234 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: capstone-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - capstone-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  spring-app:
    build:
      context: ./spring
      dockerfile: Dockerfile
    container_name: capstone-spring
    ports:
      - "8080:8080"
    environment:
      # 수정: mysql -> mariadb 호스트 및 드라이버 사용
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/capstone_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: root  # 직접 하드코딩
      SPRING_DATASOURCE_PASSWORD: 1234  # 직접 하드코딩
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      PYTHON_SERVICE_URL: http://python-app:8000
    depends_on:
      mariadb:  # 수정: mysql -> mariadb 로 이름 변경
        condition: service_healthy
      redis:
        condition: service_healthy
      python-app:
        condition: service_started
    networks:
      - capstone-net

  python-app:
    build:
      context: ./python
      dockerfile: Dockerfile
    container_name: capstone-python
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV}
      TRYON_MODE: ${TRYON_MODE}
      REDIS_URL: redis://redis:6379/0
      WORKSPACE_DIR: /app/workspace
      MOCK_RESULT_IMAGE: /app/workspace/mock/mock_result.jpg
      IDM_VTON_ROOT: /app/vton
    volumes:
      - ./python/workspace:/app/workspace
      - ./python/models:/app/models
      - ./python/mock:/app/workspace/mock
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - capstone-net

volumes:
  # mysql_data: 는 ./mariadb/data 바인드 마운트를 사용하므로 불필요하여 삭제했습니다.
  redis_data:

networks:
  capstone-net:
    driver: bridge
